# bmad-todo — Production Docker Compose Stack
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in values
#   2. Run: docker compose up --build
#
# Services:
#   - postgres  : PostgreSQL 16 database (port 5432, internal only)
#   - backend   : Fastify API server (port 3000, exposed to host)
#   - frontend  : nginx serving React SPA (port 80, exposed to host)
#
# Access:
#   Frontend : http://localhost
#   Backend  : http://localhost:3000
#   Health   : http://localhost:3000/health

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bmad_todo}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bmad_todo}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/bmad_todo}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
    driver: local
