# bmad-todo — Test Database Docker Compose
#
# Used by: backend integration tests + Playwright E2E tests
# Provides an isolated PostgreSQL instance so tests never touch the dev database.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   # (migrations are applied automatically by the backend pretest script)
#   npm test                     # backend unit + integration tests
#   npm run test:e2e             # Playwright E2E tests

services:
  postgres-test:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: bmad_todo_test
    ports:
      - "5433:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d bmad_todo_test",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-test-data:
    driver: local
